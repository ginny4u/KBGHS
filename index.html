<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국어 기말고사 대비 O/X 총정리</title>
    <style>
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background-color: #fff; border-radius: 16px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); max-width: 450px; width: 100%; }
        
        /* 공통 헤더 */
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { color: #2c3e50; font-size: 1.1rem; line-height: 1.5; margin: 0; }
        .progress { font-size: 0.95rem; color: #3498db; font-weight: bold; background: #e1f0fa; padding: 5px 12px; border-radius: 20px; display: none; }
        
        /* 1. 메인 메뉴 (작품 선택 화면) */
        #menuScreen { display: block; }
        .menu-desc { color: #555; margin-bottom: 20px; font-size: 1rem; line-height: 1.5; word-break: keep-all; }
        .menu-btn { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 18px 20px; background: #fff; border: 2px solid #3498db; border-radius: 12px; margin-bottom: 12px; font-size: 1.1rem; font-weight: bold; color: #2c3e50; transition: all 0.2s; text-align: left; }
        
        /* 클릭 가능한 버튼 호버 효과 */
        .menu-btn:not(:disabled):hover { background: #e1f0fa; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(52, 152, 219, 0.15); cursor: pointer; }
        
        /* 클릭 불가능한(준비 중) 버튼 디자인 */
        .menu-btn:disabled { background: #f8f9fa; border: 2px solid #dee2e6; color: #adb5bd; cursor: not-allowed; }
        
        .status-badge { font-size: 0.85rem; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .status-ready { background: #3498db; color: white; }
        .status-preparing { background: #e9ecef; color: #adb5bd; }

        /* 2. 퀴즈 화면 */
        #quizScreen { display: none; }
        .question-box { background-color: #ffffff; padding: 20px; border-radius: 12px; border: 2px solid #34495e; margin-bottom: 25px; font-size: 1.2rem; line-height: 1.5; color: #2c3e50; text-align: center; font-weight: bold; word-break: keep-all;}
        
        /* O/X 버튼 디자인 */
        .ox-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-o, .btn-x { flex: 1; padding: 25px 0; font-size: 3rem; font-weight: bold; border-radius: 16px; cursor: pointer; transition: all 0.2s; border: none; color: white; display: flex; justify-content: center; align-items: center; }
        .btn-o { background-color: #3498db; box-shadow: 0 6px 0 #2980b9; }
        .btn-o:active { transform: translateY(6px); box-shadow: none; }
        .btn-x { background-color: #e74c3c; box-shadow: 0 6px 0 #c0392b; }
